services:
  postgres:
    image: postgres:16-alpine
    container_name: books-online-postgres
    environment:
      POSTGRES_DB: books_online
      POSTGRES_USER: books_online
      POSTGRES_PASSWORD: books_online
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U books_online -d books_online"]
      interval: 5s
      timeout: 3s
      retries: 10

  books-online:
    build: .
    container_name: books-online-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/books_online
      SPRING_DATASOURCE_USERNAME: books_online
      SPRING_DATASOURCE_PASSWORD: books_online
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

