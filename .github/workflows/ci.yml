name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-test-and-recover:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn test

      - name: Build containers
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Verify application health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Verify product API
        run: curl -fsS http://localhost:8080/api/products

      - name: Inject application container failure
        run: docker compose stop books-online

      - name: Recover application container
        run: docker compose up -d books-online

      - name: Verify recovery
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health; then
              curl -fsS http://localhost:8080/api/products
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v
